body {

.header {

  margin-bottom: 6px;
}
.header p {

  font-size: 0.9rem;
  opacity: 0.8;
}

.card {

  border: 1px solid rgba(192, 132, 252, 0.2);
  border-radius: 20px;
  padding: 24px 20px;
  width: 100%;
  max-width: 480px;
  margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.selector-row {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 8px;
}
.selector-row > div { flex: 1; }
.selector-row label {
  display: block;
  font-size: 0.85rem;
  color: #c084fc;
  margin-bottom: 6px;
}
.selector-row select {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid rgba(192, 132, 252, 0.35);
  border-radius: 12px;
  background: rgba(26, 10, 46, 0.7);
  color: #f5e6ff;
  font-size: 1rem;
  appearance: none;
  cursor: pointer;
  transition: border-color 0.3s;
}
.selector-row select:focus {
  outline: none;
  border-color: #c084fc;
  box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.15);
}

.vs-badge {
  text-align: center;
  font-size: 1.2rem;
  color: #c084fc;
  font-weight: bold;
  padding: 0 4px;
}

.btn-match {

  border-radius: 14px;
  color: #fff;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;

  box-shadow: 0 4px 20px rgba(192, 132, 252, 0.3);
  letter-spacing: 2px;
}
.btn-match:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(192, 132, 252, 0.45);
}
.btn-match:active {
  transform: translateY(0);
}

.result-area { display: none; }
.result-area.show { display: block; }

.score-section { text-align: center; margin-bottom: 24px; }
.score-label {
  font-size: 0.9rem;
  color: #c084fc;
  margin-bottom: 4px;
}
.score-value {
  font-size: 3.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, #f9a8d4, #e879f9, #c084fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 4px;
}
.score-percent { font-size: 1.5rem; }
.level-badge {

  border-radius: 20px;
  font-size: 0.95rem;
  font-weight: 600;
  margin-top: 8px;

.level-conflict { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.4); }

.heart-bar {

.heart-bar-fill {

}

.dimensions {

  gap: 12px;

}
.dim-item {

// Simple deterministic hash function
function hash(x, y) {
  const s = Math.min(x, y) * 100 + Math.max(x, y);
  let h = 0;
  for (let i = 0; i < 4; i++) {
    h = ((h << 5) - h + ((s >> (i * 8)) & 0xFF)) | 0;
  }
  h = Math.abs(h);
  return (h % 1000) / 1000;
}

function getScore(seed, min, max) {
  return Math.floor(min + seed * (max - min + 1));
}

function match() {

  const seed = hash(i1, i2);

  // Element compatibility bonus
  const sameElement = s1.element === s2.element;
  const elementPairs = { '火风': 0.12, '风火': 0.12, '水土': 0.08, '土水': 0.08, '水水': 0.05, '火火': 0.05, '土土': 0.03, '风风': 0.03 };
  const elemKey = s1.element + s2.element;
  const elemBonus = elementPairs[elemKey] || 0;

  const baseScore = 50 + seed * 35 + diff * 1.5 * (seed > 0.5 ? 1 : -0.5) + elemBonus * 100;
  const overallScore = Math.max(15, Math.min(98, Math.round(baseScore)));

  // Dimension scores
  const comm = getScore(hash(i1 + 7, i2 + 3), 25, 98);
  const trust = getScore(hash(i1 + 11, i2 + 5), 25, 98);
  const passion = getScore(hash(i1 + 13, i2 + 7), 20, 98);
  const endurance = getScore(hash(i1 + 17, i2 + 11), 25, 98);

  // Level
  let levelKey, levelClass;
  if (overallScore >= 90) { levelKey = 'heavenly'; levelClass = 'level-heavenly'; }
  else if (overallScore >= 75) { levelKey = 'great'; levelClass = 'level-great'; }
  else if (overallScore >= 60) { levelKey = 'good'; levelClass = 'level-good'; }
  else if (overallScore >= 40) { levelKey = 'adjust'; levelClass = 'level-adjust'; }
  else { levelKey = 'conflict'; levelClass = 'level-conflict'; }

  const levelNames = { heavenly: '天作之合', great: '非常般配', good: '还不错', adjust: '需要磨合', conflict: '水火不容' };

  const adjPool1 = ['热情主动', '稳重耐心', '聪明好奇', '体贴敏感', '自信霸气', '细致理智', '优雅随和', '神秘执着', '乐观豁达', '沉稳务实', '独立博学', '浪漫多情'];
  const adjPool2 = ['主动热情', '耐心稳重', '好奇聪明', '敏感体贴', '霸气自信', '理智细致', '随和优雅', '执着神秘', '豁达乐观', '务实沉稳', '博学独立', '多情浪漫'];

  function pick(arr, seed) {
    return arr[Math.floor(seed * arr.length)];
  }

  const commentTemplate = pick(COMMENTS[levelKey], seed);
  const comment = commentTemplate
    .replace(/\{s1\}/g, s1.name).replace(/\{s2\}/g, s2.name)
    .replace(/\{s1t\}/g, s1.trait).replace(/\{s2t\}/g, s2.trait);

  const adviceTemplate = pick(ADVICE[levelKey], hash(i1 + 3, i2 + 7));
  const advice = adviceTemplate
    .replace(/\{s1\}/g, s1.name).replace(/\{s2\}/g, s2.name)
    .replace(/\{adj1\}/g, adjPool1[i1]).replace(/\{adj2\}/g, adjPool2[i2]);

  // Update DOM
  document.getElementById('scoreNum').textContent = overallScore;
  document.getElementById('levelBadge').textContent = levelNames[levelKey];
  document.getElementById('levelBadge').className = 'level-badge ' + levelClass;
  document.getElementById('commentText').textContent = comment;
  document.getElementById('adviceText').textContent = advice;

  // Dimensions grid
  const dims = [
    { name: '💬 沟通', score: comm },
    { name: '🤝 信任', score: trust },
    { name: '🔥 激情', score: passion },
    { name: '⏳ 持久度', score: endurance },
  ];
  const dimsEl = document.getElementById('dimensions');
  dimsEl.innerHTML = dims.map((d, i) => `
    <div class="dim-item" style="animation-delay:${0.3 + i * 0.15}s">
      <div class="dim-name">${d.name}</div>
      <div class="dim-score">${d.score}</div>
      <div class="dim-bar-bg"><div class="dim-bar-fill" data-score="${d.score}"></div></div>
    </div>
  `).join('');

  // Show result
  const resultArea = document.getElementById('resultArea');
  resultArea.classList.add('show');
  resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Animate bars
  requestAnimationFrame(() => {
    const bar = document.getElementById('heartBar');
    bar.style.width = '0';
    requestAnimationFrame(() => {
      bar.style.width = overallScore + '%';
    });

    document.querySelectorAll('.dim-bar-fill').forEach(el => {
      el.style.width = '0';
      setTimeout(() => { el.style.width = el.dataset.score + '%'; }, 200);
    });
  });

  // Build share card
  const scLevelClassMap = { heavenly: 'sc-level-heavenly', great: 'sc-level-great', good: 'sc-level-good', adjust: 'sc-level-adjust', conflict: 'sc-level-conflict' };
  const shareCard = document.getElementById('shareCard');
  shareCard.innerHTML = `
    <div class="sc-header">
      <h2>💑 星座配对测试</h2>
      <div class="sc-signs">
        <span class="sc-sign">${s1.emoji} ${s1.name}</span>
        <span class="sc-vs">💘</span>
        <span class="sc-sign">${s2.emoji} ${s2.name}</span>
      </div>
    </div>
    <div class="sc-score">
      <div class="big">${overallScore}<span style="font-size:1.2rem">%</span></div>
      <div class="sc-level ${scLevelClassMap[levelKey]}">${levelNames[levelKey]}</div>
    </div>
    <div class="sc-dims">
      ${dims.map(d => `<div class="sc-dim"><div class="name">${d.name}</div><div class="val">${d.score}</div></div>`).join('')}
    </div>
    <div class="sc-comment">${comment}</div>
    <div class="sc-footer">zodiac-match · 仅供娱乐</div>
  `;
}

function shareResult() {
  const shareCard = document.getElementById('shareCard');
  const wrapper = document.getElementById('shareCardWrapper');
  wrapper.style.left = '0';
  wrapper.style.top = '0';

  html2canvas(shareCard, {
    backgroundColor: null,
    scale: 2,
  }).then(canvas => {
    wrapper.style.left = '-9999px';
    canvas.toBlob(blob => {
      if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
        const file = new File([blob], 'zodiac-match.png', { type: 'image/png' });
        navigator.share({ files: [file], title: '星座配对结果' }).catch(() => {});
      }
      // Fallback: download
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'zodiac-match.png';
      a.click();
      URL.revokeObjectURL(a.href);
    }, 'image/png');
    showToast('截图已保存！');
  }).catch(() => {
    wrapper.style.left = '-9999px';
    showToast('截图失败，请重试');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Random initial selection
document.getElementById('sign1').value = Math.floor(Math.random() * 12);
document.getElementById('sign2').value = Math.floor(Math.random() * 12);
</script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
