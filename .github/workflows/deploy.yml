name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    uses: yuuuuub/cloudflare-deploy/.github/workflows/deploy.yml@main
    with:
      project-name: zodiac-match
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
